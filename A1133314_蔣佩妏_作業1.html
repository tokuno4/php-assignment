<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2026 多元探索夏令營報名表</title>
</head>

<body bgcolor="#FFF5F8">

<center>
    <h1><font color="DeepPink">2026 多元探索夏令營報名表</font></h1>
    <p>請填寫以下資料完成報名，如有問題可聯絡我們</p>
</center>

<form>
<table border="1" width="800" align="center" cellpadding="8" cellspacing="0" bgcolor="White">

    <tr bgcolor="HotPink">
        <td colspan="4" align="center"><font color="white">個人基本資料</font></td>
    </tr>

    <tr>
        <td align="center">姓名</td>
        <td><input type="text" name="name" required></td>
        <td align="center">性別</td>
        <td>
            <input type="radio" name="gender">男
            <input type="radio" name="gender">女
            <input type="radio" name="gender">其他
        </td>
    </tr>

    <tr>
        <td align="center">生日</td>
        <td><input type="date" name="birth"></td>
        <td align="center">電話</td>
        <td><input type="tel" name="phone" required></td>
    </tr>

    <tr>
        <td align="center">電子郵件</td>
        <td colspan="3"><input type="email" name="email" size="50" required></td>
    </tr>

    <tr bgcolor="HotPink">
        <td colspan="4" align="center"><font color="white">學校相關資料</font></td>
    </tr>

    <tr>
        <td align="center">就讀學校</td>
        <td><input type="text" name="school"></td>
        <td align="center">年級</td>
        <td>
            <select name="grade">
                <option>國一</option>
                <option>國二</option>
                <option>國三</option>
                <option>高一</option>
                <option>高二</option>
                <option>高三</option>
            </select>
        </td>
    </tr>

    <tr>
        <td align="center">班級</td>
        <td><input type="text" name="class"></td>
        <td align="center">是否參加過營隊</td>
        <td>
            <input type="radio" name="camp_exp">有
            <input type="radio" name="camp_exp">沒有
        </td>
    </tr>

    <tr bgcolor="HotPink">
        <td colspan="4" align="center"><font color="white">營隊選擇</font></td>
    </tr>

    <tr>
        <td align="center">想參加的活動</td>
        <td>
            <select name="camp">
                <option>科學探索</option>
                <option>戶外活動</option>
                <option>團隊合作</option>
                <option>創意手作</option>
            </select>
        </td>
        <td align="center">想參加的時間</td>
        <td>
            <input type="radio" name="time">第一梯次
            <input type="radio" name="time">第二梯次
        </td>
    </tr>

    <tr>
        <td align="center">飲食習慣</td>
        <td>
            <input type="radio" name="food">葷
            <input type="radio" name="food">素
        </td>
        <td align="center">T-shirt 尺寸</td>
        <td>
            <input type="radio" name="size">S
            <input type="radio" name="size">M
            <input type="radio" name="size">L
            <input type="radio" name="size">XL
        </td>
    </tr>

    <tr>
        <td align="center">平常的興趣（可複選）</td>
        <td colspan="3">
            <input type="checkbox">遊戲
            <input type="checkbox">運動
            <input type="checkbox">音樂
            <input type="checkbox">手作
        </td>
    </tr>

    <tr bgcolor="HotPink">
        <td colspan="4" align="center"><font color="white">聯絡方式</font></td>
    </tr>

    <tr>
        <td align="center">緊急聯絡人姓名</td>
        <td><input type="text"></td>
        <td align="center">緊急聯絡電話</td>
        <td><input type="tel"></td>
    </tr>

    <tr>
        <td align="center">通訊地址</td>
        <td colspan="3"><input type="text" size="80"></td>
    </tr>

    <tr>
        <td align="center">其他想告訴我們的事</td>
        <td colspan="3">
            <textarea rows="4" cols="80"></textarea>
        </td>
    </tr>

    <tr>
        <td colspan="4" align="center">
            <input type="checkbox" required> 我已確認以上資料填寫正確，並同意相關規定<br><br>
            <input type="submit" value="送出">
            <input type="reset" value="清除內容">
        </td>
    </tr>

</table>
</form>

</body>
</html>
